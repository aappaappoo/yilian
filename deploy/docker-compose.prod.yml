services:
  db:
    image: registry.cn-hangzhou.aliyuncs.com/tb59954681/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soulmeet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soulmeet_password}
      POSTGRES_DB: ${POSTGRES_DB:-soulmeet_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soulmeet} -d ${POSTGRES_DB:-soulmeet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: registry.cn-hangzhou.aliyuncs.com/tb59954681/coturn:latest
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49252:49152-49252/udp"
    command:
      - "-n"
      - "--listening-port=3478"
      - "--listening-ip=0.0.0.0"
      - "--relay-ip=0.0.0.0"
      - "--external-ip=${PUBLIC_IP:-36.138.141.202}"
      - "--realm=soulmeet"
      - "--lt-cred-mech"
      - "--user=${TURN_USERNAME:-soulmeet}:${TURN_CREDENTIAL:-soulmeet_turn_password}"
      - "--min-port=49152"
      - "--max-port=49252"
      - "--no-tls"
      - "--no-dtls"
      - "--log-file=stdout"
      - "--fingerprint"
      - "--no-multicast-peers"
      - "--no-cli"

  backend:
    image: registry.cn-hangzhou.aliyuncs.com/tb59954681/soulmeet-backend:latest
    restart: unless-stopped
    command: ["python", "main.py"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DASHSCOPE_PREFER_IPV4: "true"
      DASHSCOPE_WS_CONNECTION_TIMEOUT: "30"
      CONTEXT_SQL_URL: postgresql+asyncpg://${POSTGRES_USER:-soulmeet}:${POSTGRES_PASSWORD:-soulmeet_password}@db:5432/${POSTGRES_DB:-soulmeet_db}
      CORS_ORIGINS: "https://${PUBLIC_IP:-36.138.141.202}:5173,https://${PRIVATE_IP:-192.168.0.84}:5173,https://127.0.0.1:5173"
      TURN_URL: "turn:${PUBLIC_IP:-36.138.141.202}:3478"
      TURN_USERNAME: "${TURN_USERNAME:-soulmeet}"
      TURN_CREDENTIAL: "${TURN_CREDENTIAL:-soulmeet_turn_password}"
    depends_on:
      db:
        condition: service_healthy
      coturn:
        condition: service_started
    volumes:
      - backend_logs:/app/log

  web:
    image: registry.cn-hangzhou.aliyuncs.com/tb59954681/soulmeet-web:latest
    restart: unless-stopped
    environment:
      SSL_DOMAIN: "${PUBLIC_IP:-36.138.141.202}"
    depends_on:
      - backend
    ports:
      - "5173:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl

volumes:
  pgdata:
    driver: local
  backend_logs:
    driver: local
