# ── 上下文管理配置 ──
context_management:
  max_context_messages: 40
  summary_limit: 3
  events_limit: 15

  important_events:
    enabled: true
    event_categories:
      - "情绪波动"
      - "生活事件"
      - "兴趣爱好"
      - "个人信息"
      - "情感状态"
      - "互动偏好"
    # LLM 统一分析 prompt — 1次调用输出所有记忆
    extraction_prompt: |
      你作为记忆管理模块。请分析以下对话，提取所有值得长期记住的信息。

      事件类别包括：{categories} 等等

      对话内容：
      {conversation}

      请以 JSON 数组格式返回，每条记忆包含：
      - contents: 记忆内容（简洁文本 或 三元组JSON）
      - msg_type: 可以是 [对话摘要, 事实, 用户主动记录] 或者 自行补充
      - content_type: 内容主题（如上述类别）
      - importance: 重要程度 1-10（请根据对用户陪伴的价值认真判断，不要使用默认值）

      规则：
      1. 必须生成至少一条「对话摘要」
      2. importance字段的排行可以是：情感状态变化 > 用户偏好 > 日常互动
      3. 日常寒暄如果无实用信息 importance = 1
      4. 如果对话太短无内容，返回 []

  summary:
    enabled: true
    summary_prompt: |
      请将以下对话压缩为简洁的摘要，保留关键信息和情感基调。
      字数控制在 200 字以内。
      对话内容：
      {conversation}
